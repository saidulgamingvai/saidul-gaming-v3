
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Saidul Gaming Vai Live Score</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<video id="bg-video" autoplay muted loop>
    <source src="assets/video/bg.mp4" type="video/mp4">
</video>

<div class="overlay">

<header>

<div class="live">🔴 LIVE</div>

<div class="tournament">
FIFA WORLD CUP 2026
</div>

</header>

<div class="scoreboard">

<div class="team">

<img id="homeLogo"
src="assets/teams/argentina.png">

<h2 id="homeTeam">
Argentina
</h2>

</div>

<div class="center">

<h1 id="score">
0 - 0
</h1>

<div id="timer">
00:00
</div>

</div>

<div class="team">

<img id="awayLogo"
src="assets/teams/brazil.png">

<h2 id="awayTeam">
Brazil
</h2>

</div>

</div>

<div class="card">

<h3>⚽ Goal Scorers</h3>

<div id="goalScorers">
No Goals
</div>

</div>

<div class="card">

<h3>📊 Match Stats</h3>

<div id="stats">
No Stats
</div>

</div>

<div class="card">

<h3>🎙 Commentary</h3>

<div id="commentary">
Match will start soon...
</div>

</div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>
<div id="goalPopup">
    ⚽ GOAL!
</div>

<audio id="goalSound">
    <source src="assets/audio/goal.mp3" type="audio/mpeg">
</audio>
</body>
</html>
